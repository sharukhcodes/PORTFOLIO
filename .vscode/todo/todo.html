<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks — My Todo App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #7c6af7;
    --accent-soft: rgba(124,106,247,0.12);
    --accent-glow: rgba(124,106,247,0.25);
    --text: #f0eeff;
    --text-2: #9896b0;
    --text-3: #5a5870;
    --done-line: #3a3850;
    --high: #f97066;
    --high-bg: rgba(249,112,102,0.1);
    --med: #f5a524;
    --med-bg: rgba(245,165,36,0.1);
    --low: #17c964;
    --low-bg: rgba(23,201,100,0.1);
    --danger: #f97066;
    --danger-bg: rgba(249,112,102,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 80px;
  }

  /* Ambient bg blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    top: -100px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(249,112,102,0.06) 0%, transparent 70%);
    bottom: 0; right: -80px;
  }

  .container {
    width: 100%;
    max-width: 580px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header { margin-bottom: 36px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .date-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.03em;
    margin-top: 6px;
  }

  .stats { display: flex; gap: 20px; margin-top: 16px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; }

  .progress-bar-wrap { margin-top: 16px; height: 3px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 999px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .input-card:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  .input-main { display: flex; align-items: center; gap: 10px; }
  .input-icon { color: var(--text-3); font-size: 18px; flex-shrink: 0; }

  #task-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    caret-color: var(--accent);
  }
  #task-input::placeholder { color: var(--text-3); }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .add-btn:hover { background: #9685ff; box-shadow: 0 0 16px var(--accent-glow); }
  .add-btn:active { transform: scale(0.93); }
  .add-btn svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.5; fill: none; }

  .input-meta { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); align-items: center; }
  .meta-label { font-size: 12px; color: var(--text-3); margin-right: 4px; }

  .priority-pill {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: var(--surface2);
    color: var(--text-2);
  }
  .priority-pill:hover { background: var(--surface); color: var(--text); }
  .priority-pill.active-high { background: var(--high-bg); color: var(--high); border-color: rgba(249,112,102,0.25); }
  .priority-pill.active-med { background: var(--med-bg); color: var(--med); border-color: rgba(245,165,36,0.25); }
  .priority-pill.active-low { background: var(--low-bg); color: var(--low); border-color: rgba(23,201,100,0.25); }

  .due-input {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-2);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    color-scheme: dark;
  }
  .due-input:focus { border-color: var(--accent); }

  /* Filter tabs */
  .filters { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
  .filter-btn {
    flex: 1;
    padding: 7px 0;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-2);
    transition: all 0.18s;
    font-weight: 400;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-hover); }

  /* Todo list */
  .section-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; padding-left: 4px; }

  .todo-list { display: flex; flex-direction: column; gap: 6px; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.18s, background 0.18s, transform 0.15s, box-shadow 0.15s;
    cursor: grab;
    animation: slideIn 0.22s cubic-bezier(.4,0,.2,1) both;
    position: relative;
    overflow: hidden;
  }
  .todo-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    transition: opacity 0.18s;
    opacity: 0;
  }
  .todo-item.p-high::before { background: var(--high); opacity: 1; }
  .todo-item.p-med::before { background: var(--med); opacity: 1; }
  .todo-item.p-low::before { background: var(--low); opacity: 1; }

  .todo-item:hover { border-color: var(--border-hover); background: #1c1c22; }
  .todo-item:hover .del-btn { opacity: 1; }
  .todo-item.dragging { opacity: 0.4; transform: scale(0.98); box-shadow: 0 8px 30px rgba(0,0,0,0.4); cursor: grabbing; }
  .todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .todo-item.done { opacity: 0.6; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-3); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .check-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); animation: pop 0.25s ease; }
  .check-btn.checked svg { stroke: white; }
  .check-btn svg { width: 11px; height: 11px; stroke: transparent; stroke-width: 3; fill: none; transition: stroke 0.15s; }

  .todo-content { flex: 1; min-width: 0; }
  .todo-text {
    font-size: 14px;
    color: var(--text);
    outline: none;
    cursor: text;
    display: block;
    transition: color 0.18s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .todo-text:focus { white-space: normal; overflow: visible; }

  .todo-due { font-size: 11px; color: var(--text-3); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
  .todo-due.overdue { color: var(--high); }
  .todo-due svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; }

  .p-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }
  .tag-high { background: var(--high-bg); color: var(--high); }
  .tag-med { background: var(--med-bg); color: var(--med); }
  .tag-low { background: var(--low-bg); color: var(--low); }

  .del-btn {
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    opacity: 0;
    transition: opacity 0.18s, background 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { background: var(--danger-bg); }
  .del-btn svg { width: 15px; height: 15px; stroke: var(--text-3); stroke-width: 2; fill: none; transition: stroke 0.15s; }
  .del-btn:hover svg { stroke: var(--danger); }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 0 40px;
    color: var(--text-3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .empty svg { width: 48px; height: 48px; stroke: var(--text-3); stroke-width: 1; fill: none; opacity: 0.5; }
  .empty p { font-size: 14px; }

  /* Footer */
  .footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
  .footer-left { font-size: 12px; color: var(--text-3); }
  .clear-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-3); transition: all 0.15s; }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 999px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">Task<span>·</span>Flow</div>
      <div class="date-badge" id="date-label"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="stat-remaining">0</span>
        <span class="stat-label">Remaining</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-main">
      <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" />
      <button class="add-btn" id="add-btn" title="Add task">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="input-meta">
      <span class="meta-label">Priority:</span>
      <button class="priority-pill active-high" data-p="high" id="p-high">High</button>
      <button class="priority-pill" data-p="med" id="p-med">Medium</button>
      <button class="priority-pill" data-p="low" id="p-low">Low</button>
      <input type="date" class="due-input" id="due-input" title="Due date" />
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Completed</button>
  </div>

  <!-- List -->
  <div class="section-label" id="section-label">Tasks</div>
  <div class="todo-list" id="todo-list"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-left" id="footer-count"></span>
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>
</div>

<script>
const STORE_KEY = 'taskflow-tasks';
let tasks = [];
let filter = 'all';
let selectedPriority = 'high';
let dragSrc = null;
let nextId = 1;

function load() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      tasks = parsed.tasks || [];
      nextId = parsed.nextId || (tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 1);
    }
  } catch(_) {}
  if (!tasks.length) {
    tasks = [
      { id: nextId++, text: 'Design the landing page mockup', done: false, priority: 'high', due: '' },
      { id: nextId++, text: 'Review pull requests from the team', done: false, priority: 'med', due: '' },
      { id: nextId++, text: 'Write unit tests for auth module', done: false, priority: 'high', due: '' },
      { id: nextId++, text: 'Update project documentation', done: true, priority: 'low', due: '' },
      { id: nextId++, text: 'Set up CI/CD pipeline', done: false, priority: 'med', due: '' },
    ];
    save();
  }
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify({ tasks, nextId }));
}

function getFiltered() {
  return tasks.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.done : !t.done
  );
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function isOverdue(str) {
  if (!str) return false;
  const d = new Date(str + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function render() {
  const list = document.getElementById('todo-list');
  const filtered = getFiltered();
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const remaining = total - done;

  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('progress-fill').style.width = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('footer-count').textContent = `${done} of ${total} completed`;

  const sectionMap = { all: 'All Tasks', active: 'Active Tasks', done: 'Completed Tasks' };
  document.getElementById('section-label').textContent = sectionMap[filter];

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12l3 3 5-5"/></svg>
      <p>${filter === 'done' ? 'No completed tasks yet' : 'Nothing here — add a task above!'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const tagClass = { high:'tag-high', med:'tag-med', low:'tag-low' }[t.priority];
    const itemClass = `p-${t.priority}`;
    const overdue = !t.done && isOverdue(t.due);
    const dueStr = t.due ? `<div class="todo-due${overdue ? ' overdue' : ''}">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${overdue?'Overdue · ':''}${formatDate(t.due)}
    </div>` : '';
    const tagLabel = { high:'High', med:'Medium', low:'Low' }[t.priority];
    return `<div class="todo-item ${itemClass}${t.done ? ' done' : ''}" data-id="${t.id}" draggable="true">
      <button class="check-btn${t.done ? ' checked' : ''}" data-id="${t.id}" aria-label="${t.done?'Mark incomplete':'Mark complete'}">
        <svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1"/></svg>
      </button>
      <div class="todo-content">
        <span class="todo-text" contenteditable="true" spellcheck="false" data-id="${t.id}">${escHtml(t.text)}</span>
        ${dueStr}
      </div>
      <span class="p-tag ${tagClass}">${tagLabel}</span>
      <button class="del-btn" data-id="${t.id}" aria-label="Delete task">
        <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');

  bindItemEvents();
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function bindItemEvents() {
  document.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = +btn.dataset.id;
      const t = tasks.find(t=>t.id===id);
      if (t) { t.done = !t.done; save(); render(); }
    });
  });

  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tasks = tasks.filter(t=>t.id !== +btn.dataset.id);
      save(); render();
    });
  });

  document.querySelectorAll('.todo-text').forEach(span => {
    span.addEventListener('blur', () => {
      const id = +span.dataset.id;
      const t = tasks.find(t=>t.id===id);
      const newText = span.textContent.trim();
      if (t && newText) { t.text = newText; save(); }
      else if (t && !newText) { span.textContent = t.text; }
    });
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
      if (e.key === 'Escape') { const t = tasks.find(t=>t.id===+span.dataset.id); if(t) span.textContent=t.text; span.blur(); }
    });
  });

  document.querySelectorAll('.todo-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.todo-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (item !== dragSrc) {
        document.querySelectorAll('.todo-item').forEach(i=>i.classList.remove('drag-over'));
        item.classList.add('drag-over');
      }
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== item) {
        const srcId = +dragSrc.dataset.id;
        const tgtId = +item.dataset.id;
        const srcIdx = tasks.findIndex(t=>t.id===srcId);
        const tgtIdx = tasks.findIndex(t=>t.id===tgtId);
        const [moved] = tasks.splice(srcIdx, 1);
        tasks.splice(tgtIdx, 0, moved);
        save(); render();
      }
    });
  });
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const due = document.getElementById('due-input').value;
  tasks.unshift({ id: nextId++, text, done: false, priority: selectedPriority, due });
  input.value = '';
  input.focus();
  save(); render();
}

function setPriority(p) {
  selectedPriority = p;
  document.querySelectorAll('.priority-pill').forEach(btn => {
    btn.className = 'priority-pill';
    if (btn.dataset.p === p) btn.classList.add(`active-${p}`);
  });
}

// Init date
const now = new Date();
document.getElementById('date-label').textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// Priority pills
document.querySelectorAll('.priority-pill').forEach(btn => {
  btn.addEventListener('click', () => setPriority(btn.dataset.p));
});

// Add button
document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// Clear completed
document.getElementById('clear-btn').addEventListener('click', () => {
  tasks = tasks.filter(t=>!t.done);
  save(); render();
});

load();
render();
</script>
</body>
</html>
